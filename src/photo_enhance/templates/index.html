<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Photo Auto-Enhance</title>
  <style>
    :root { color-scheme: light dark; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      max-width: 960px;
      margin: 2rem auto;
      padding: 0 1rem;
      line-height: 1.4;
    }
    h1 { font-size: 1.4rem; }
    form {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      align-items: center;
      margin-bottom: 1.5rem;
    }
    select, input[type="file"], button {
      font-size: 1rem;
      padding: 0.4rem 0.6rem;
    }
    button {
      cursor: pointer;
    }
    .error {
      color: #b00020;
    }
    .compare {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .compare figure {
      flex: 1 1 300px;
      margin: 0;
    }
    .compare img {
      width: 100%;
      height: auto;
      border-radius: 6px;
      border: 1px solid #8883;
    }
    figcaption {
      text-align: center;
      font-size: 0.9rem;
      opacity: 0.8;
      margin-top: 0.25rem;
    }
    .hint {
      font-size: 0.85rem;
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <h1>Photo Auto-Enhance</h1>
  <p class="hint">Runs locally. Nothing leaves this machine. Same auto white-balance + levels + CLAHE pipeline as the CLI, with optional creative presets.</p>

  <form action="/enhance" method="post" enctype="multipart/form-data">
    <input type="file" name="photo" accept="image/*" required>
    <select name="preset">
      <option value="">No preset (auto-enhance only)</option>
      {% for preset in presets %}
        <option value="{{ preset }}">{{ preset.replace('_', ' ').title() }}</option>
      {% endfor %}
    </select>
    <button type="submit">Enhance</button>
  </form>

  {% if error %}
    <p class="error">{{ error }}</p>
  {% endif %}

  {% if result %}
    <div class="compare">
      <figure>
        <img src="{{ result.before }}" alt="Original photo">
        <figcaption>Before</figcaption>
      </figure>
      <figure>
        <img src="{{ result.after }}" alt="Enhanced photo">
        <figcaption>After{% if result.preset %} — {{ result.preset.replace('_', ' ').title() }}{% endif %}</figcaption>
      </figure>
    </div>
  {% endif %}
</body>
</html>
